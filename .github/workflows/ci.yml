name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test-and-evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest -q

      - name: Run golden query evaluation
        env:
          PYTHONPATH: src
        run: python scripts/evaluate_golden_set.py --min-pass-rate 0.80
