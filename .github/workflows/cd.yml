name: CD

on:
  push:
    branches: ["main", "master"]
    paths:
      - "src/**"
      - "k8s/**"
      - "Dockerfile"
      - "requirements.txt"
      - ".github/workflows/cd.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.compute-image.outputs.image_uri }}
