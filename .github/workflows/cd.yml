name: CD

on:
  push:
    branches: ["main", "master"]
    paths:
      - "src/**"
      - "k8s/**"
      - "Dockerfile"
      - "requirements.txt"
      - ".github/workflows/cd.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.compute-image.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image repo
        id: prep
        run: echo "image_repo=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image_repo }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Compute deploy image
        id: compute-image
        run: |
          image_repo="${{ steps.prep.outputs.image_repo }}"
          image_tag="${GITHUB_SHA}"
          echo "image_uri=${image_repo}:${image_tag}" >> "$GITHUB_OUTPUT"
