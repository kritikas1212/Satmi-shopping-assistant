apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: satmi-app
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: satmi-chatbot
      app.kubernetes.io/component: api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      honorLabels: true
  namespaceSelector:
    matchNames:
      - satmi
